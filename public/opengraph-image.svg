<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#1A0A2E"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow circles -->
  <circle cx="200" cy="150" r="300" fill="rgba(108,99,255,0.1)"/>
  <circle cx="1000" cy="500" r="250" fill="rgba(236,72,153,0.08)"/>

  <!-- Logo box -->
  <rect x="80" y="80" width="80" height="80" rx="20" fill="url(#grad)"/>
  <text x="120" y="135" text-anchor="middle" font-size="44">🔄</text>

  <!-- Title -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="white">SkillSwap</text>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="72" font-weight="900">
    <tspan fill="url(#grad)">Belgium</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">Échangez vos compétences · Belgique 🇧🇪</text>

  <!-- Stats -->
  <rect x="80" y="500" width="200" height="60" rx="14" fill="rgba(108,99,255,0.2)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
  <text x="180" y="538" text-anchor="middle" font-family="Arial" font-size="16" fill="#a5a0ff" font-weight="700">500+ membres</text>

  <rect x="300" y="500" width="200" height="60" rx="14" fill="rgba(108,99,255,0.2)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
  <text x="400" y="538" text-anchor="middle" font-family="Arial" font-size="16" fill="#a5a0ff" font-weight="700">1200+ échanges</text>

  <rect x="520" y="500" width="200" height="60" rx="14" fill="rgba(108,99,255,0.2)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
  <text x="620" y="538" text-anchor="middle" font-family="Arial" font-size="16" fill="#a5a0ff" font-weight="700">FR · NL · EN</text>

  <!-- URL -->
  <text x="1120" y="590" text-anchor="end" font-family="Arial" font-size="20" fill="rgba(255,255,255,0.3)">skillswap-belgium.com</text>
</svg>
